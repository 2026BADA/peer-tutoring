openapi: '3.0.0'
info:
  title: peer-tutoring API
  version: '1.0.0'
  description: |
    바다 웹부 팀 프로젝트 - 문제 질문/답변 및 포인트 서비스 API
    
    ### 인증
    Supabase Auth를 사용합니다. 로그인 후 발급된 JWT 토큰을 Bearer 형식으로 전달하세요.
    
    ### 포인트 정책
    - 질문 작성: -5
    - 답변 작성: +5
    - 답변 채택됨: +15

servers:
  - url: http://localhost:3000/api
    description: 개발 서버
  - url: https://your-domain.com/api
    description: 프로덕션 서버

tags:
  - name: Users
    description: 유저 프로필 및 활동 내역
  - name: Questions
    description: 질문 CRUD
  - name: Answers
    description: 답변 CRUD 및 채택
  - name: Tags
    description: 태그 목록

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase Auth JWT 토큰

  schemas:
    # ────────── 공통 ──────────
    Pagination:
      type: object
      properties:
        total:
          type: integer
          example: 100
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10

    Error:
      type: object
      properties:
        error:
          type: string
          example: 에러 메시지

    # ────────── User ──────────
    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
          example: 바다
        avatarUrl:
          type: string
          example: https://example.com/avatar.png
        points:
          type: integer
          example: 150
        questionCount:
          type: integer
          example: 5
        answerCount:
          type: integer
          example: 12
        createdAt:
          type: string
          format: date-time

    UserPatch:
      type: object
      properties:
        avatarUrl:
          type: string
          example: https://example.com/avatar.png

    # ────────── Question ──────────
    QuestionSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          example: 미적분 문제 질문입니다
        content:
          type: string
          example: 질문 내용 미리보기...
        author:
          $ref: '#/components/schemas/AuthorSimple'
        tags:
          type: array
          items:
            type: string
          example: ["수학", "미적분"]
        isSolved:
          type: boolean
          example: false
        viewCount:
          type: integer
          example: 42
        answerCount:
          type: integer
          example: 3
        createdAt:
          type: string
          format: date-time

    QuestionDetail:
      allOf:
        - $ref: '#/components/schemas/QuestionSummary'
        - type: object
          properties:
            answers:
              type: array
              items:
                $ref: '#/components/schemas/AnswerItem'

    QuestionCreate:
      type: object
      required:
        - title
        - content
      properties:
        title:
          type: string
          example: 미적분 문제 질문입니다
        content:
          type: string
          example: 질문 내용...
        tags:
          type: array
          items:
            type: string
          example: ["수학", "미적분"]

    QuestionPatch:
      type: object
      properties:
        title:
          type: string
          example: 수정된 제목
        content:
          type: string
          example: 수정된 내용
        tags:
          type: array
          items:
            type: string
          example: ["수학"]

    # ────────── Answer ──────────
    AnswerItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
          example: 답변 내용
        author:
          $ref: '#/components/schemas/AuthorSimple'
        isAccepted:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time

    AnswerCreate:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          example: 답변 내용...

    AnswerPatch:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          example: 수정된 답변 내용...

    AcceptResult:
      type: object
      properties:
        answerId:
          type: string
          format: uuid
        isAccepted:
          type: boolean
          example: true
        pointsAwarded:
          type: integer
          example: 15

    # ────────── Point ──────────
    PointHistoryItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        amount:
          type: integer
          example: 15
        reason:
          type: string
          example: 답변 채택
        refId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

    # ────────── Tag ──────────
    Tag:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: 수학

    # ────────── 공통 작성자 ──────────
    AuthorSimple:
      type: object
      properties:
        username:
          type: string
          example: 바다
        avatarUrl:
          type: string
          example: https://example.com/avatar.png

  responses:
    Unauthorized:
      description: 미인증 (토큰 없음 또는 만료)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: 로그인이 필요합니다.
    Forbidden:
      description: 권한 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: 권한이 없습니다.
    NotFound:
      description: 존재하지 않는 리소스
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: 존재하지 않는 리소스입니다.
    Conflict:
      description: 중복 데이터
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: 이미 존재하는 데이터입니다.

paths:

  # ══════════════════════════════
  # Users
  # ══════════════════════════════

  /users/{username}:
    get:
      tags: [Users]
      summary: 프로필 조회
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Users]
      summary: 프로필 수정 (본인만)
      security:
        - bearerAuth: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPatch'
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{username}/questions:
    get:
      tags: [Users]
      summary: 유저가 작성한 질문 목록
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Pagination'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/QuestionSummary'

  /users/{username}/answers:
    get:
      tags: [Users]
      summary: 유저가 작성한 답변 목록
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Pagination'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          allOf:
                            - $ref: '#/components/schemas/AnswerItem'
                            - type: object
                              properties:
                                questionId:
                                  type: string
                                  format: uuid
                                questionTitle:
                                  type: string
                                  example: 질문 제목

  /users/{username}/points:
    get:
      tags: [Users]
      summary: 포인트 내역 조회 (본인만)
      security:
        - bearerAuth: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Pagination'
                  - type: object
                    properties:
                      currentPoints:
                        type: integer
                        example: 150
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/PointHistoryItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ══════════════════════════════
  # Questions
  # ══════════════════════════════

  /questions:
    get:
      tags: [Questions]
      summary: 질문 목록 조회
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: tag
          in: query
          schema:
            type: string
          example: 수학
        - name: isSolved
          in: query
          schema:
            type: boolean
        - name: search
          in: query
          schema:
            type: string
          example: 미적분
        - name: sort
          in: query
          schema:
            type: string
            enum: [latest, views, answers]
            default: latest
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Pagination'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/QuestionSummary'

    post:
      tags: [Questions]
      summary: 질문 작성
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuestionCreate'
      responses:
        '201':
          description: 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionSummary'
        '400':
          description: 필드 누락 또는 유효성 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          description: 포인트 부족
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: 포인트가 부족합니다.

  /questions/{id}:
    get:
      tags: [Questions]
      summary: 질문 상세 조회 (조회수 +1)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionDetail'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Questions]
      summary: 질문 수정 (작성자만)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuestionPatch'
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Questions]
      summary: 질문 삭제 (작성자만)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 삭제 성공
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ══════════════════════════════
  # Answers
  # ══════════════════════════════

  /questions/{id}/answers:
    post:
      tags: [Answers]
      summary: 답변 작성
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnswerCreate'
      responses:
        '201':
          description: 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnswerItem'
        '400':
          description: 내용 누락
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /answers/{id}:
    patch:
      tags: [Answers]
      summary: 답변 수정 (작성자만)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnswerPatch'
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnswerItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Answers]
      summary: 답변 삭제 (작성자만)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 삭제 성공
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /answers/{id}/accept:
    post:
      tags: [Answers]
      summary: 답변 채택 (질문 작성자만)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 채택 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  # ══════════════════════════════
  # Tags
  # ══════════════════════════════

  /tags:
    get:
      tags: [Tags]
      summary: 태그 목록 조회
      parameters:
        - name: search
          in: query
          schema:
            type: string
          example: 수
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tag'